# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/notesdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# JWT
app.jwt.secret=your-256-bit-secret-key-here-make-it-long-and-random-for-production
app.jwt.expiration-ms=86400000

# Actuator (for health endpoint)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
